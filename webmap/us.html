<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>US Power Grid Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/png" href="./assets/world-icon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div id="app-shell">
      <main id="map-shell">
        <div
          id="loading-overlay"
          class="loading-overlay"
          role="status"
          aria-live="polite"
          aria-label="Loading US power grid map"
          aria-hidden="false"
        >
          <div class="loading-overlay-inner">
            <div class="loading-gears" aria-hidden="true">
              <span class="gear gear-lg">⚙</span>
              <span class="gear gear-md">⚙</span>
              <span class="gear gear-sm">⚙</span>
            </div>
            <div class="loading-title">Booting the US Power Grid</div>
            <div class="loading-subtitle">Staging layers • Checking sources • Warming tiles</div>
          </div>
        </div>

        <div id="map"></div>

        <button id="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false">
          <span class="theme-icon theme-icon-sun" aria-hidden="true">☀</span>
          <span class="theme-icon theme-icon-moon" aria-hidden="true">☾</span>
        </button>

        <nav id="country-switcher" class="country-switcher" aria-label="Select map country">
          <a class="country-switcher-btn" href="./">Brazil</a>
          <a class="country-switcher-btn is-active" href="./us.html" aria-current="page">US</a>
        </nav>

        <section id="map-title-card" class="map-ui-card">
          <h1>US Power Grid</h1>
          <p class="subtitle">Interactive map for US transmission lines</p>
          <p class="footnote">
            Data source:
            <a href="https://mapyourgrid.org/global-grid-data/" target="_blank" rel="noopener">MapYourGrid - Global Grid Data</a>
          </p>
          <p class="footnote source-code-footnote">
            <span class="source-code-label">Source code:</span>
            <a class="github-link" href="https://github.com/mcllerena/brazil-power-grid-map" target="_blank" rel="noopener">
              <svg class="github-icon" viewBox="0 0 16 16" width="16" height="16" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z" />
              </svg>
              GitHub
            </a>
          </p>
        </section>

        <aside id="status-panel" class="map-ui-card" aria-live="polite">
          <h2>Status Window</h2>
          <ul id="status-list"></ul>
        </aside>

        <aside id="map-ui-left" class="map-ui-column" aria-label="Left layer controls"></aside>
        <aside id="map-ui-right" class="map-ui-column" aria-label="Right layer controls"></aside>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/shpjs@6.2.0/dist/shp.js"></script>
    <script type="module" src="./js/main-us.js"></script>
  </body>
</html>
